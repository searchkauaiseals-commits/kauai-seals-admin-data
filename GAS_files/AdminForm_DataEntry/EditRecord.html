  <script>
    //sets focus to search input box
    window.onload = function() {
      var searchInput = document.getElementById('permIdSearch');
      if (searchInput) {
        searchInput.focus();
      } else {
        console.error('Search input box not found');
      }
    };

    function populateDropdowns() {
      google.script.run
        .withSuccessHandler(function(data) {
          var colMap = [
            ['number',     'A'],
            ['mark',       'B'],
            ['location1',  'C'],
            ['location1a', 'D'],
            ['site',       'E']
          ];
          for (var i = 1; i <= 7; i++) {
            colMap.forEach(function(pair) {
              var dropdown = document.getElementById(i + pair[0]);
              if (!dropdown) return;
              dropdown.innerHTML = '';
              data[pair[1]].forEach(function(value) {
                var option = document.createElement('option');
                option.textContent = value;
                option.value = value;
                dropdown.appendChild(option);
              });
            });
          }
        })
        .withFailureHandler(function(error) {
          console.error('getAllDropdowns failed:', error);
        })
        .getAllDropdowns();
    }
    document.addEventListener("DOMContentLoaded", populateDropdowns);
  </script>

  <script>
    // Declare global variables to store the IDs
    let currentPermId = '';
    let editPermId = '';
    let preEditGroup = '';
    let editGroup = '';  
    
    function toggleButtonInversion(button) {
      button.classList.add('inverse');
      setTimeout(() => {
        button.classList.remove('inverse');
      }, 300); // Duration of the color inversion effect
    }
    
    document.addEventListener("DOMContentLoaded", function() {
      console.log('DOM fully loaded and parsed'); 
      const groupSelect = document.getElementById('group');
      const newGroupInput = document.getElementById('newGroupInput');
      const searchButton = document.getElementById("searchbutton");
      const submitButton = document.getElementById("submitbutton");

      google.script.run
      .withSuccessHandler(function(permId) {
        if (permId) {
          console.log('Received permId:', permId);
          document.getElementById('permIdSearch').value = permId;
          // Trigger the search
          performSearch(permId);
        }
      })
      .getEditPermId();

      groupSelect.addEventListener('change', function() {
      if (this.value === 'add_new') {
          this.style.display = 'none';
          newGroupInput.style.display = 'inline-block';
          newGroupInput.focus();
        }
      });

      newGroupInput.addEventListener('blur', function() {
          if (this.value.trim() === '') {
              this.style.display = 'none';
              groupSelect.style.display = 'inline-block';
              groupSelect.value = ' ';
          } else {
              // Add the new option to the select
              const newOption = document.createElement('option');
              newOption.value = this.value;
              newOption.text = this.value;
              groupSelect.insertBefore(newOption, groupSelect.lastElementChild);
              
              // Select the new option
              groupSelect.value = this.value;
              
              // Hide the input and show the select
              this.style.display = 'none';
              groupSelect.style.display = 'inline-block';
          }
      });

      newGroupInput.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
              this.blur();
          }
      });

      function debounce(func, wait) {
        let timeout;
        return function executedFunction(...args) {
          const later = () => {
            clearTimeout(timeout);
            func(...args);
          };
          clearTimeout(timeout);
          timeout = setTimeout(later, wait);
        };
      }

      if (searchButton) {
        const debouncedSearch = debounce(function() {
          const permId = document.getElementById("permIdSearch").value;
          console.log("search button pressed");
          performSearch(permId);
        }, 300); // 300ms debounce time

        searchButton.addEventListener("click", function() {
          toggleButtonInversion(searchButton);
          debouncedSearch();
        });
      }

      if (submitButton) {
        submitButton.addEventListener("click", function() {
        toggleButtonInversion(submitButton);
        console.log('Submit button clicked!');

        const permIdInput = document.getElementById('permid');
        const groupValueRaw = groupSelect.value.trim();
        const groupValue = groupValueRaw === 'add_new' ? newGroupInput.value.trim() : groupValueRaw;

        // Validate Group
        if (!groupValue || groupValue === ' ') {
          alert("GROUP is a required field. Please select or enter a Group before submitting.");
          if (newGroupInput.style.display === 'inline-block') {
            newGroupInput.focus();
          } else {
            groupSelect.focus();
          }
          return;
        }

        // Validate PermID
        let permIdRaw = permIdInput.value.trim(); // Change to let, as we might modify it

        if (!permIdRaw) {
          showEmptyPermidDialog("Please enter a PermID before submitting.")
            .then(() => permIdInput.focus())
            .catch(error => console.error('Error or dialog closed:', error));
          return;
        }

        // Temp IDs handling
        if (groupValue.toLowerCase() === 'temp ids') {
          if (!permIdRaw.toLowerCase().startsWith('temp')) {
            alert("For 'Temp IDs', PermID must start with 'temp'.");
            permIdInput.focus();
            return;
          }
          // Auto-fix only the prefix if it's not exactly 'temp' (case-insensitive)
          permIdInput.value = 'temp' + permIdRaw.slice(4);
          permIdRaw = permIdInput.value; // Update permIdRaw after auto-fix for subsequent checks
        } else { // This block is for non-Temp IDs groups
          const firstFour = permIdRaw.substring(0, 4);

          // --- VALIDATION: First 4 characters must be:
          //      1. Start with a letter
          //      2. Followed by 3 alphanumeric characters
          //      3. At least one of those 3 must be a number
          // regex: ^[a-zA-Z](?=[a-zA-Z0-9]*[0-9])[a-zA-Z0-9]{3}$
          if (!/^[a-zA-Z](?=[a-zA-Z0-9]*[0-9])[a-zA-Z0-9]{3}$/.test(firstFour)) {
            alert("PermID must start with a letter and contain at least one number in the first 4 characters (e.g., R345, RU20, R8HA).");
            permIdInput.focus();
            return;
          }

          // --- AUTO-FIX: Convert first 4 characters to uppercase if they contain lowercase letters ---
          if (/[a-z]/.test(firstFour)) {
            permIdInput.value = firstFour.toUpperCase() + permIdRaw.substring(4);
            permIdRaw = permIdInput.value; // Update permIdRaw after auto-fix for subsequent checks
            console.log("PermID auto-corrected to uppercase in first 4 characters for non-Temp IDs.");
            // No alert, no return. The flow continues.
          }
          // --- END AUTO-FIX ---
        }

        // Validate SZ
        const szInput = document.getElementById('sz');
        const szValue = szInput.value.trim().toUpperCase();
        if (!validateSz(szValue)) {
          showCustomSzErrorDialog('Invalid SZ format. Please enter NA, W, P, J, J1, J2, S3, S4, A, or A5 (or greater).')
            .then(() => szInput.focus())
            .catch(error => console.error('Error or dialog closed:', error));
          return;
        }
        szInput.value = szValue; // Update the actual input field with the validated value
          
          var formData = ProcessRecordData();
          if (formData === null) {
            // Validation failed, do not proceed with submission
            return;
          }

        google.script.run
          .withSuccessHandler(function(rowNumber) {
            displayEditSuccessMessage(rowNumber);
          })
          .withFailureHandler(function(error) {
            console.error('Error updating record:', error);
            showCustomSzErrorDialog('Error updating record: ' + error.message);
          })
          .EditRecord(formData);
        });
      } else {
        console.error('Submit button not found');
      }      
    });

    /*
    // Use for testing  with call above
    function testServerLogging() {
      console.log('Testing server logging');
      google.script.run
        .withSuccessHandler(function(result) {
          console.log('Server logging test result:', result);
        })
        .withFailureHandler(function(error) {
          console.error('Server logging test error:', error);
        })
        .testServerLogging();
    }
    */

    function performSearch(permId) {
      console.log('Entering performSearch function');
      console.log('Performing search for PermID:', permId);

      try {
        google.script.run
          .withSuccessHandler(function(response) {
            console.log('Search response received:', response);
            if (response.singleMatch) {
              console.log('Single match found, populating form');
              populateForm(response.data);
            } else if (response.multipleMatches) {
              console.log('Multiple matches found, handling');
              handleMultipleMatches(response.matches);
            } else if (response.error) {
              console.error('Error from server:', response.error);
              showErrorModal(`Error: ${response.error}`)
                .then(() => {
                  document.getElementById('permIdSearch').focus();
                })
                .catch(error => {
                  console.error('Error showing modal:', error);
                });
            }
          })
          .withFailureHandler(function(error) {
            console.error('Error searching record:', error);

    function createMatchesMessage(matches) {

      });
      return message;
    }

    function showCustomConfirmDialog(matches) {
      return new Promise((resolve, reject) => {
        const dialog = document.getElementById('customConfirmDialog');
        const confirmMessage = document.getElementById('confirmMessage');
        const closeButton = document.getElementById('confirmClose'); 

        if (!dialog || !confirmMessage || !closeButton) {

          reject(new Error('Custom confirm dialog elements not found'));
          return;
        }

        confirmMessage.innerHTML = 'Multiple matching records found. Please select one:<br><br>';

        matches.forEach((match, index) => {
          const button = document.createElement('button');
          button.textContent = `${index + 1}: ${match.permid}`;
          button.className = 'selectButton';
          button.dataset.index = index;
          confirmMessage.appendChild(button);
          confirmMessage.innerHTML += '<br>';
        });

        dialog.style.display = 'block';

        const selectButtons = document.querySelectorAll('.selectButton');
        selectButtons.forEach(button => {
          button.addEventListener('click', function() {
            // Add blink effect on click
            this.classList.add('blink-on-click');
            
            // Delay closing the modal to allow the blink animation to be visible
            setTimeout(() => {
              const selectedIndex = this.dataset.index;
              dialog.style.display = 'none';
              resolve(selectedIndex); // Resolve with the index of the selected record
            }, 500); // Match this duration with the blink animation duration
          });
        });

        closeButton.addEventListener('click', function() {
          dialog.style.display = 'none';
          reject(new Error('Dialog closed'));
        });
      });
    }

    function validateSz(value) {
      console.log('Validating SZ:', value);
      
      // Trim and uppercase the input
      value = value.trim().toUpperCase();
      
      // Check for NA, W, P, J, J1, J2, S3, S4, A
      if (['NA','W', 'P', 'J', 'J1', 'J2', 'S3', 'S4', 'A'].includes(value)) {
        return true;
      }
      
      // Check for A5 or greater
      if (value.startsWith('A')) {
        const number = parseInt(value.slice(1));
        return !isNaN(number) && number >= 5;
      }
      
      // If none of the above conditions are met, it's invalid
      return false;
    }
