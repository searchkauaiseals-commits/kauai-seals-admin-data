  <script>
    //sets focus to search input box
    window.onload = function() {
      var searchInput = document.getElementById('permIdSearch');

    function populateDropdowns() {
      google.script.run
        .withSuccessHandler(function(data) {
          var colMap = [
            ['number',     'A'],
            ['mark',       'B'],
            ['location1',  'C'],
            ['location1a', 'D'],
            ['site',       'E']
          ];
          for (var i = 1; i <= 7; i++) {
            colMap.forEach(function(pair) {
              var dropdown = document.getElementById(i + pair[0]);
              if (!dropdown) return;
              dropdown.innerHTML = '';
              data[pair[1]].forEach(function(value) {
                var option = document.createElement('option');
                option.textContent = value;
                option.value = value;
                dropdown.appendChild(option);
              });
            });
          }
        })
        .withFailureHandler(function(error) {
          console.error('getAllDropdowns failed:', error);
        })
        .getAllDropdowns();
    }
    document.addEventListener("DOMContentLoaded", populateDropdowns);

  </script>

  <script>
    function toggleButtonInversion(button) {
      button.classList.add('inverse');
      setTimeout(() => {
        button.classList.remove('inverse');
      }, 300); // Duration of the color inversion effect
    }
    document.addEventListener("DOMContentLoaded", function() {
      console.log('DOM fully loaded and parsed');
      const searchButton = document.getElementById("searchbutton");
      const deleteButton = document.getElementById("deleteButton");

      if (searchButton) {
          searchButton.addEventListener("click", function() {
              console.log('Search button clicked!');
              toggleButtonInversion(searchButton);
              const permId = document.getElementById("permIdSearch").value;
              console.log('Perm ID:', permId);
          google.script.run
          .withSuccessHandler(function(response) {
              console.log('Search response received:', response);
              if (response.singleMatch) {
                console.log('Single match found, populating form');
                populateForm(response.data);
              } else if (response.multipleMatches) {
                console.log('Multiple matches found, handling');
                handleMultipleMatches(response.matches);
              } else if (response.error) {
                console.error('Error from server:', response.error);
                showRecordNotFoundErrorModal(`Error: ${response.error}`)
                  .then(() => {
                    // Focus on the search input after closing the error modal
                    document.getElementById('permIdSearch').focus();
                  })
                  .catch(error => {
                    console.error('Error showing modal:', error);
                  });
              }
          })
          .withFailureHandler(function(error) {
            console.error('Failure:', error);
            showRecordNotFoundErrorModal(`An error occurred: ${error.message || error}`)
              .then(() => {
                console.log('Error modal closed');
                document.getElementById('permIdSearch').focus();
              })
              .catch(error => {
                console.error('Error showing modal:', error);
              });
          })
          .GetRecordData(permId);
        });
      }

      if (deleteButton) {
          deleteButton.addEventListener("click", function() {
              console.log('Delete button clicked!');
              toggleButtonInversion(deleteButton); 
              
              // Fetch rowNumber correctly from the hidden field
              const rowNumber = document.getElementById('lastRowNumberDisplay').value;
              console.log('Row number:', rowNumber);
              const permId = document.getElementById("permIdSearch").value;
              console.log('PermId:', permId);

              if (!rowNumber) {
                  console.error('Row number is undefined. Deletion cannot proceed.');
                  alert('No row selected for deletion.');
                  return;
              }
              
              customConfirm("Are you sure you want to <b>DELETE</b> this record?").then((result) => {
                  if (result) {
                      console.log('Deletion confirmed');
                      google.script.run
                          .withSuccessHandler(function(response) {
                              console.log('Delete response from server:', response);
                              displayDeleteSuccessMessage(rowNumber);
                          })
                          .withFailureHandler(function(error) {
                              console.error('Delete Error:', error);
                              document.getElementById('output').innerHTML = 'Error deleting record: ' + error.message;
                          })
                          .DeleteRecord(rowNumber, permId); // Pass the correct rowNumber and permId
                          console.log('DeleteRecord function called');
                  } else {
                      console.log('Deletion cancelled');
                  }
              }).catch(error => {
                  console.error('Error in customConfirm:', error);
              });
          });
      } else {
          console.error('Delete button not found');
      }

    });

    function handleMultipleMatches(matches) {
      showCustomConfirmDialog(matches)
        .then(selectedIndex => {
          console.log('Selected index:', selectedIndex);
          populateForm(matches[selectedIndex]);
        })
        .catch(error => {
          console.error('Error or dialog closed:', error);
        });
    }

    function createMatchesMessage(matches) {
      console.log('createMatchesMessage called');
      let message = "Multiple matches found. Please select one to edit:<br><br>";
      matches.forEach((match, index) => {
        message += `<button onclick="resolveCustomConfirm(${index})">${index + 1}. ${match.permid}</button><br>`;
      });
      return message;
    }

    function showCustomConfirmDialog(matches) {
      console.log('showCustomConfirmDialog called');
      return new Promise((resolve, reject) => {
        const dialog = document.getElementById('customMatchesConfirmDialog');
        const confirmMessage = document.getElementById('confirmMessage');
        const closeButton = document.getElementById('confirmClose'); 

        if (!dialog || !confirmMessage) {

          reject(new Error('Custom confirm dialog elements not found'));
          return;
        }

        confirmMessage.innerHTML = 'Multiple matching records found. Please select one:<br><br>';

        matches.forEach((match, index) => {
          const button = document.createElement('button');
          button.textContent = `${index + 1}: ${match.permid}`;
          button.className = 'selectButton';
          button.dataset.index = index;
          confirmMessage.appendChild(button);
          confirmMessage.innerHTML += '<br>';
        });

        dialog.style.display = 'block';

        const selectButtons = document.querySelectorAll('.selectButton');
        selectButtons.forEach(button => {
          button.addEventListener('click', function() {
            // Add blink effect on click
            this.classList.add('blink-on-click');
            
            // Delay closing the modal to allow the blink animation to be visible
            setTimeout(() => {
              const selectedIndex = this.dataset.index;
              dialog.style.display = 'none';
              resolve(selectedIndex); // Resolve with the index of the selected record
            }, 500); // Match this duration with the blink animation duration
          });
        });

        closeButton.addEventListener('click', function() {
          dialog.style.display = 'none';
          reject(new Error('Dialog closed'));
        });
      });
    }

    function closeModal() {
      const dialog = document.getElementById('customConfirmDialog');
      dialog.style.display = 'none';
    }

    function showRecordNotFoundErrorModal(message) {
      console.log('Attempting to show record not found error modal');
      return new Promise((resolve, reject) => {
        const dialog = document.getElementById('recordNotFoundDialog');
        const errorMessage = document.getElementById('recordNotFoundMessage');

        console.log('Dialog elements:', { dialog, errorMessage });

        if (!dialog || !errorMessage) {
          console.error('Record not found dialog elements not found');
          reject(new Error('Record not found dialog elements not found'));
          return;
        }

        errorMessage.innerHTML = `${message}<br><br>`;

        const okButton = document.createElement('button');
        okButton.textContent = 'OK';
        okButton.className = 'selectButton';
        
        const buttonContainer = document.createElement('div');
        buttonContainer.className = 'button-container';
        buttonContainer.appendChild(okButton);
        errorMessage.appendChild(buttonContainer);

        console.log('Setting dialog display to block');
        dialog.style.display = 'block';

        okButton.addEventListener('click', function() {
          console.log('OK button clicked');
          this.classList.add('blink-on-click');
          
          setTimeout(() => {
            dialog.style.display = 'none';
            resolve();
          }, 500);
        });
      });
    }
    
    function showErrorModal(message) {
      console.log('Attempting to show error modal');
      return new Promise((resolve, reject) => {
        const dialog = document.getElementById('customConfirmDialog');
        const confirmMessage = document.getElementById('confirmMessage');

        console.log('Dialog elements:', { dialog, confirmMessage });

        if (!dialog || !confirmMessage) {
          console.error('Custom confirm dialog elements not found');
          reject(new Error('Custom confirm dialog elements not found'));
          return;
        }

        confirmMessage.innerHTML = `${message}<br><br>`;

        const okButton = document.createElement('button');
        okButton.textContent = 'OK';
        okButton.className = 'selectButton';
        
        const buttonContainer = document.createElement('div');
        buttonContainer.className = 'button-container';
        buttonContainer.appendChild(okButton);
        confirmMessage.appendChild(buttonContainer);

        console.log('Setting dialog display to block');
        dialog.style.display = 'block';

        okButton.addEventListener('click', function() {
          console.log('OK button clicked');
          this.classList.add('blink-on-click');
          
          setTimeout(() => {
            dialog.style.display = 'none';
            resolve();
          }, 500);
        });
      });
    }

    function customConfirm(message) {
      console.log('customConfirm(message) initiated');
        return new Promise((resolve, reject) => {
            const dialog = document.getElementById('customConfirmDialog');
            const confirmMessage = document.getElementById('confirmDeleteMessage');
            const yesButton = document.getElementById('confirmYes');
            const noButton = document.getElementById('confirmNo');

            if (!dialog || !confirmMessage || !yesButton || !noButton) {
                reject(new Error('Custom confirm dialog elements not found'));
                return;
            }

            confirmMessage.innerHTML = message;
            dialog.style.display = 'block';

            yesButton.onclick = () => {
                dialog.style.display = 'none';
                resolve(true);
            };

            noButton.onclick = () => {
                dialog.style.display = 'none';
                resolve(false);
            };
        });
    }

    function displayDeleteSuccessMessage(rowNumber) {
        console.log("displayDeleteSuccessMessage rowNumber = " + rowNumber);

        const deleteButton = document.getElementById('deleteButton');
