<!DOCTYPE html>
<html lang="en">
<head>

  <style>
      /* Container holding the submit button */
      .custom-button {
        font-size: 16px;
        padding: 5px;
        cursor: pointer;
        border: 1px solid black;
        border-radius: 4px;
        flex-grow: 1;
        min-width: 80px;
        margin-right: 10px;
        margin-top: 0px;
        position: relative;
        top: -2px;
      }
      .custom-button:not(#submitbutton) {
        background-color: rgb(247, 243, 243);
        color: black;
      }
      #submitbutton {
        background-color: rgb(0,128,0) !important;
        color: white !important;
      }
      .custom-button:hover {
        background-color: rgb(214, 214, 214); /* Dark gray background */
      }
      .custom-button.inverse {
        background-color: black;

      }
      .button-inverse {
        background-color: currentColor;
        color: inherit;
      }
      #submitbutton.inverse {
        background-color: white!important;
        color: rgb(0,128,0) !important;
      }
      .required-label {
        color: black;
        font-size: 14px; /* Optional: Adjust size for better readability */
        position: absolute;
        top: 30px;
        right: 45px;
        background-color: transparent; /* Ensure no background for the label */
      }
      .red-asterick {
        color: red;
      }
      .modal {
        display: none;
        position: fixed;
        z-index: 1;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0,0,0,0.4);
      }
      .modal-content {
        background-color: #fefefe;

        padding: 20px;
        border: 1px solid #888;
        border-radius: 6px;

  <script>
    function populateDropdowns() {
      google.script.run
        .withSuccessHandler(function(data) {
          var colMap = [
            ['number',     'A'],
            ['mark',       'B'],
            ['location1',  'C'],
            ['location1a', 'D'],
            ['site',       'E']
          ];
          for (var i = 1; i <= 7; i++) {
            colMap.forEach(function(pair) {
              var dropdown = document.getElementById(i + pair[0]);
              if (!dropdown) return;
              dropdown.innerHTML = '';
              data[pair[1]].forEach(function(value) {
                var option = document.createElement('option');
                option.textContent = value;
                option.value = value;
                dropdown.appendChild(option);
              });
            });
          }
        })
        .withFailureHandler(function(error) {
          console.error('getAllDropdowns failed:', error);
        })
        .getAllDropdowns();
    }
    document.addEventListener("DOMContentLoaded", populateDropdowns);
  </script>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const submitButton = document.getElementById("submitbutton");
    const groupSelect = document.getElementById('group');
    const newGroupInput = document.getElementById('newGroupInput');

    groupSelect.addEventListener('change', function () {
      if (this.value === 'add_new') {
        this.style.display = 'none';
        newGroupInput.style.display = 'inline-block';
        newGroupInput.focus();
      }
    });

    newGroupInput.addEventListener('blur', function () {
      if (this.value.trim() === '') {
        this.style.display = 'none';
        groupSelect.style.display = 'inline-block';
        groupSelect.value = ' ';
      } else {
        const newOption = document.createElement('option');
        newOption.value = this.value;
        newOption.text = this.value;
        groupSelect.insertBefore(newOption, groupSelect.lastElementChild);
        groupSelect.value = this.value;
        this.style.display = 'none';
        groupSelect.style.display = 'inline-block';
      }
    });

    newGroupInput.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        this.blur();
      }
    });

    function toggleButtonInversion(button) {
      button.classList.add('inverse');
      setTimeout(() => {
        button.classList.remove('inverse');
      }, 300);
    }

    if (submitButton) {
      submitButton.addEventListener("click", function () {
        toggleButtonInversion(submitButton);
        console.log('Submit button clicked!');

        const permIdInput = document.getElementById('permid');
        const groupValueRaw = groupSelect.value.trim();
        const groupValue = groupValueRaw === 'add_new' ? newGroupInput.value.trim() : groupValueRaw;

        // Validate Group===========================================================
        if (!groupValue || groupValue === ' ') {
          alert("GROUP is a required field. Please select or enter a Group before submitting.");
          if (newGroupInput.style.display === 'inline-block') {
            newGroupInput.focus();
          } else {
            groupSelect.focus();
          }
          return;
        }

        // Validate PermID==========================================================
        let permIdRaw = permIdInput.value.trim(); // Change to let, as we might modify it

        if (!permIdRaw) {
          showEmptyPermidDialog("Please enter a PermID before submitting.")
            .then(() => permIdInput.focus())
            .catch(error => console.error('Error or dialog closed:', error));
          return;
        }

        // Temp IDs handling
        if (groupValue.toLowerCase() === 'temp ids') {
          if (!permIdRaw.toLowerCase().startsWith('temp')) {
            alert("For 'Temp IDs', PermID must start with 'temp'.");
            permIdInput.focus();
            return;
          }
          // Auto-fix only the prefix if it's not exactly 'temp' (case-insensitive)
          permIdInput.value = 'temp' + permIdRaw.slice(4);
          permIdRaw = permIdInput.value; // Update permIdRaw after auto-fix for subsequent checks
        } else {
          const firstFour = permIdRaw.substring(0, 4);

          // --- First 4 characters must be:
          //      1. Start with a letter
          //      2. Followed by 3 alphanumeric characters
          //      3. At least one of those 3 must be a number
          // regex: ^[a-zA-Z](?=[a-zA-Z0-9]*[0-9])[a-zA-Z0-9]{3}$
          // - ^[a-zA-Z]: Starts with a letter
          // - (?=[a-zA-Z0-9]*[0-9]): Positive lookahead to ensure there's at least one digit
          //                           among the next three alphanumeric chars.
          //   - [a-zA-Z0-9]*: Any alphanumeric characters (zero or more)
          //   - [0-9]: Followed by at least one digit
          // - [a-zA-Z0-9]{3}$: Exactly three alphanumeric characters after the first letter,
          //                     and anchors to the end of the firstFour string.
          if (!/^[a-zA-Z](?=[a-zA-Z0-9]*[0-9])[a-zA-Z0-9]{3}$/.test(firstFour)) {
            alert("PermID must start with a letter and contain at least one number in the first 4 characters (e.g., R345, RU20, R8HA).");
            permIdInput.focus();
            return;
          }
          // --- END EDITED VALIDATION ---

          // --- AUTO-FIX: Convert first 4 characters to uppercase if they contain lowercase letters ---
          // This logic remains the same as it handles the case conversion after the format validation
          if (/[a-z]/.test(firstFour)) {
            permIdInput.value = firstFour.toUpperCase() + permIdRaw.substring(4);
            permIdRaw = permIdInput.value; // Update permIdRaw after auto-fix for subsequent checks
            console.log("PermID auto-corrected to uppercase in first 4 characters.");
            // No alert, no return. The flow continues.
          }
          // --- END AUTO-FIX ---
        }

        // Validate SZ=====================================================================
        const szInput = document.getElementById('sz');
        const szValue = szInput.value.trim().toUpperCase();
        if (!validateSz(szValue)) {
          showCustomSzErrorDialog('Invalid SZ format. Please enter NA, W, P, J, J1, J2, S3, S4, A, or A5 (or greater).')
            .then(() => szInput.focus())
            .catch(error => console.error('Error or dialog closed:', error));
          return;
        }
        szInput.value = szValue; // Update the actual input field with the validated value

        // Process form
        const formData = ProcessRecordData();
        if (formData === null) return; // ProcessRecordData might return null if its internal SZ validation fails

        google.script.run
          .withSuccessHandler(function (isDuplicate) {
            if (isDuplicate) {
              customConfirm('This PermID already exists. Do you want to edit the existing record instead?')
                .then((result) => {
                  if (result) {
                    google.script.run
                      .withSuccessHandler(() => google.script.host.close())
                      .withFailureHandler(error => {
                        console.error('Error opening EditRecord.html:', error);
                        customConfirm('Error opening Edit Record page. Please try again.');
                      })
                      .openEditRecordPage(formData.permid);
                  }
                });
            } else {
                customConfirm("Are you sure you want to <b>ADD</b> this record?<br>" +
                  "<b>PermID:</b> <span style='color:red; font-weight:bold;'>" +
                  formData.permid +
                  "</span>"
                )
                .then((result) => {
                  if (result) {
                    appendNewRecord(formData);
                  }
                });
            }
          })
          .withFailureHandler(function (error) {
            console.error('Error checking PermID:', error);
            customConfirm('An error occurred while checking the PermID. Please try again.');
          })
          .duplicatePermidCheck(formData.permid);
      });
    } else {
      console.error('Submit button not found');
    }
  });
  
  function ProcessRecordData() {
    const form = document.getElementById('frmAddRecord');
    const formData = {};

    // Collect form data from most elements
    for (let i = 0; i < form.elements.length; i++) {
        const field = form.elements[i];
        // Exclude submit buttons and the newGroupInput for initial collection
        // The group value will be handled specifically below
        // The SZ value will be taken directly as it's pre-validated in submitButton handler
        if (field.type !== 'submit' && field.id && field.id !== 'newGroupInput') {
            formData[field.id] = field.value;
        }
    }

    console.log('Form data collected (before final adjustments):', formData);

    formData.sz = document.getElementById('sz').value; // Use the value directly from the UI field

    // Handle group selection - this logic remains here to correctly determine the 'group' value for formData
    const groupSelect = document.getElementById('group');
    const newGroupInput = document.getElementById('newGroupInput');
    if (newGroupInput.style.display !== 'none' && newGroupInput.value.trim() !== '') {
        formData.group = newGroupInput.value.trim();
    } else {
        formData.group = groupSelect.value;
    }
    
    console.log('Final formData in ProcessRecordData:', formData); // Log final object
    return formData; // Always returns the formData object now, as no internal validation returns null
  }

  function appendNewRecord(formData) {
      console.log("Final formData: ", formData);
      
      const dataToAppend = Object.values(formData);

      google.script.run
          .withSuccessHandler(function(returnedRow) {
              console.log('Row data returned:', returnedRow);

              if (returnedRow && returnedRow.lastRow) {
                  displaySuccessMessage(returnedRow.lastRow);
              } else {
                  console.error('Invalid row data returned:', returnedRow);
              }

              // Clear form
              document.getElementById('frmAddRecord').reset();
              document.getElementById('group').value = ' ';
          })
          .withFailureHandler(function(error) {
              console.error('Error:', error);
              customConfirm('Error adding row: ' + error.message);
          })
          .appendRow(dataToAppend);
  }
  
  function validateSz(value) {
    console.log('Validating SZ:', value);
    
    // Trim and uppercase the input
    value = value.trim().toUpperCase();
    
    // Check for NA, W, P, J, J1, J2, S3, S4, A
    if (['NA', 'W', 'P', 'J', 'J1', 'J2', 'S3', 'S4', 'A'].includes(value)) {
      return true;
    }
    
    // Check for A5 or greater
    if (value.startsWith('A')) {
      const number = parseInt(value.slice(1));
      return !isNaN(number) && number >= 5;
    }
    
    // If none of the above conditions are met, it's invalid
    return false;
  }


  function customConfirm(message, yesLabel = 'Yes', noLabel = 'No') {
    return new Promise((resolve, reject) => {
      const dialog = document.getElementById('customConfirmDialog');
      const confirmMessage = document.getElementById('confirmMessage');
      const yesButton = document.getElementById('confirmYes');
      const noButton = document.getElementById('confirmNo');

      if (!dialog || !confirmMessage || !yesButton || !noButton) {
          reject(new Error('Custom confirm dialog elements not found'));
          return;
      }

      confirmMessage.innerHTML = message;
      yesButton.textContent = yesLabel;
      noButton.textContent = noLabel;
      dialog.style.display = 'block';

      yesButton.onclick = () => {
          dialog.style.display = 'none';
          resolve(true);
      };

      noButton.onclick = () => {
          dialog.style.display = 'none';
          resolve(false);
      };
    });
  }

  function showEmptyPermidDialog(message) {
    console.log('Attempting to show empty permid error dialog');
    return new Promise((resolve, reject) => {
      const dialog = document.getElementById('EmptyPermidDialog');
      const confirmEmptyPermidMessage = dialog.querySelector('#EmptyPermidMessage');

      console.log('Dialog elements:', { dialog, confirmEmptyPermidMessage });

      if (!dialog || !confirmEmptyPermidMessage) {
        console.error('Empty permid error dialog elements not found');
        reject(new Error('Empty permid error dialog elements not found'));
        return;
      }

      confirmEmptyPermidMessage.textContent = message;

      const okButton = document.createElement('button');
      okButton.textContent = 'OK';
      okButton.className = 'modal-button';
      confirmEmptyPermidMessage.appendChild(okButton);

      console.log('Dialog content set, about to display');
      dialog.style.display = 'block';

      const closeModal = () => {
        dialog.style.display = 'none';
        okButton.remove(); // Remove the dynamically added button
        resolve();
      };

      okButton.addEventListener('click', function() {
        console.log('OK button clicked');
        this.classList.add('blink-on-click');

        setTimeout(() => {
          closeModal();
          document.getElementById('permid').focus(); // Set focus to permid input
        }, 500); // Match this duration with the blink animation duration
      });
    });
  }

  function showCustomSzErrorDialog(message) {
    console.log('Attempting to show SZ error dialog');
    return new Promise((resolve, reject) => {
      const dialog = document.getElementById('customSzErrorDialog');
      const confirmSzMessage = dialog.querySelector('#szConfirmMessage');

      console.log('Dialog elements:', { dialog, confirmSzMessage });

      if (!dialog || !confirmSzMessage) {
        console.error('Custom Sz error dialog elements not found');
        reject(new Error('Custom Sz error dialog elements not found'));
        return;
      }

      // Format the message with line breaks and grouping
      const formattedMessage = `
        Invalid SZ format.<br>
        Please enter one of the following:
        <br><br>
        NA,<br>
        W,<br>
        P,<br>
        J, J1, J2,<br>
        S3, S4,<br>
        A, or A5 (or greater)<br>
      `;           
      
      confirmSzMessage.innerHTML = formattedMessage;

      const okButton = document.createElement('button');
      okButton.textContent = 'OK';
      okButton.className = 'selectButton';
      confirmSzMessage.appendChild(okButton);

      console.log('Dialog content set, about to display');
      dialog.style.display = 'block';

      okButton.addEventListener('click', function() {
        console.log('OK button clicked');
        this.classList.add('blink-on-click');
        
        setTimeout(() => {
          dialog.style.display = 'none';
          resolve();
        }, 500); // Match this duration with the blink animation duration
      });
    });
  }

  function displaySuccessMessage(returnedRow) {
    const submitButton = document.getElementById('submitbutton');
    submitButton.disabled = true; // Disable the button
    submitButton.textContent = 'Record Successfully Added';
    submitButton.style.backgroundColor = 'green';
    submitButton.style.color = 'white';
    console.log('returnedRow = ',returnedRow);

    setTimeout(() => {
      submitButton.disabled = false;
      submitButton.textContent = 'Submit';
      submitButton.style.backgroundColor = ''; // Reset background color
      submitButton.style.color = ''; // Reset text color
    },2000); // Restore button after 2 seconds

    setTimeout(function() { google.script.host.close();}, 1000); // Close after 1 seconds
    // Call the server-side function for set focus and highlight
    google.script.run.setFocusAndHighlightLater(returnedRow, true);
  }
