<!DOCTYPE html>
<html>
<head>
  <base target="_top">
<style>
    /* enable wrapping only for specified columns */
    .wrap { white-space: normal; }
    .nowrap { white-space: nowrap; }

    #buttonContainer {    /* Button container */
      display: inline;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding-bottom: 10px; /* Add space below buttons */
    }
    #tableContainer {
      overflow-y: auto;
      border: 1px solid #ccc;
      max-height: 650px; /* Adjust height as needed */
      width: 100%;
    }
    #searchBox {
      height: 25px;
      width: 250px;
    }
    #clearButton {
      height: 30px;
      width: 75px;
    }    
    #resultsTable {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed; /* Important for fixed widths */
    }
    #resultsTable td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    #resultsTable th {
      background-color: #3B82F6;
      color: white;
      font-weight: bold;
      border: 1px solid black;
      padding: 8px;
      text-align: left;
      top: 0;
      position: sticky;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div id="buttonContainer">
    <input type="text" id="searchBox" placeholder="Search...">
    <button id="clearButton" onclick="clearSearch()">Clear</button>
    <span style="margin-left: 75px;">Total Records: </span>
    <span id="recordCount" style="font-weight: bold;">_</span>
  </div>

  <br><br>
  <div id="tableContainer">
    <table id="resultsTable">
      <thead>
        <tr>
          <th style="width: 71px;">PermId</th>
          <th style="width: 60px;">Sz</th>
          <th style="width: 30px;">Age</th>
          <th style="width: 65px;">Sex</th>
          <th style="width: 77px;">Left Tag</th>
          <th style="width: 77px;">Right Tag</th>
          <th style="width: 209px;">Comments</th>
          <th style="width: 296px;">Markings</th>
          <th style="display: none;">Combined Columns</th> <!-- Hide this column -->
        </tr>
      </thead>
      <tbody>
        <!-- Results will be injected here -->
      </tbody>
    </table>
  </div>
  <div id="alertMessage" style="display: none; position: fixed; top: 120px; left: 20px; background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1); z-index: 1000;">
    No Matching Records Found
  </div>
  <script>
    // Populate the table and set up the event listener when the page loads
    window.onload = function() {
      google.script.run.withSuccessHandler(populateTable).getModalData();
      const searchBox = document.getElementById('searchBox');
      searchBox.addEventListener('input', filterResults); // Listen for input events
      searchBox.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') { // Listen for Enter key
        filterResults();
        }
      });
    };
  
    function populateTable(data) {
      google.script.run.logCall("HTML populateTable", {data: data});
      const tbody = document.getElementById('resultsTable').getElementsByTagName('tbody')[0];
      tbody.innerHTML = ''; // Clear existing rows

      console.log("data passed to populatetable: " + data);

      // Define columns with wrapping enabled
      const wrapColumns = [0, 4, 5, 6, 7, 8];

      data.forEach((row) => {
          const tr = document.createElement('tr');

          // Loop through all visible columns (D:S) and exclude the Combined Columns column (index 8)
          row.forEach((cell, index) => {
              if (index !== 8) { // Assuming index 55 is for Combined Columns
                  const td = document.createElement('td');
                  td.textContent = cell;
                  td.dataset.originalText = cell; // Store the original text for reset
                  
                  // Apply wrapping for specified columns
                  if (wrapColumns.includes(index)) {
                      td.style.whiteSpace = 'normal'; // Enable wrapping
                  } else {
                      td.style.whiteSpace = 'nowrap'; // No wrapping for other columns
                  }

                  tr.appendChild(td);
              }
          });

          // Add a hidden cell for the combined columns
          const hiddenTd = document.createElement('td');
          hiddenTd.textContent = row[8]; 
          //console.log(`Combined Columns (row[8]): ${hiddenTd.textContent}`);
          hiddenTd.style.display = "none"; // Hide this column
          tr.appendChild(hiddenTd); // Append the hidden column

          tbody.appendChild(tr);
      });
      updateTotalRecordsCount();      
      document.getElementById('searchBox').focus();
    }


    function getTotalRecords() {
      logCall("getTotalRecords", {});
      const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName('Data');
      const totalRecords = sheet.getRange('A5:A').getValues().filter(String).length; // Count non-empty cells in A5:A
      return totalRecords;
    }

    function updateTotalRecordsCount() {
      google.script.run.logCall("HTML updateTotalRecordsCount", {});
      console.log("update record count called");
      const table = document.getElementById('resultsTable');
      const rows = table.getElementsByTagName('tr'); // Get all rows
      let visibleRowCount = 0; // Initialize count

      // Loop through the rows and count only those that are visible
      for (let i = 1; i < rows.length; i++) { // Start from 1 to skip header row
          if (rows[i].style.display !== 'none') { // Check if the row is visible
              visibleRowCount++;
          }
      }
      // Update the record count display
      document.getElementById('recordCount').textContent = visibleRowCount;

    }
    
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
          filterResults(); // Trigger filter on Enter key
        }
    }

    function filterResults() {
        google.script.run.logCall("filterResults", {});      
        const input = document.getElementById('searchBox').value.toLowerCase();
        const terms = input.split(/\s+/).map(term => (term === 'male' || term === 'tag') ? String.fromCharCode(160) + term : term);
        console.log('Search Terms:', terms);

        const table = document.getElementById('resultsTable');
        const rows = table.getElementsByTagName('tr');
        let visibleRowCount = 0;
            
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            const combinedColumnContent = row.cells[row.cells.length - 1]?.textContent?.toLowerCase(); // Access the last cell which is hidden

            if (!combinedColumnContent) continue; // Skip if there's no combined column content
            
            const allTermsPresent = terms.every(term => combinedColumnContent.includes(term));  // Check if all search terms are present          
            row.style.display = allTermsPresent ? '' : 'none';  // Show or hide the row based on whether all terms are present

            if (allTermsPresent) {
                visibleRowCount++;
                // Highlight matching terms in the visible cells
                for (let j = 0; j < row.cells.length - 1; j++) { // Exclude the last cell which is hidden
                    let cell = row.cells[j];
                    let cellText = cell.dataset.originalText; // Use stored original text
                    
                    // Reset cell innerHTML to original text
                    cell.innerHTML = cellText;

                    // Highlight only complete matches
                    terms.forEach(term => {
                        if (term.trim() !== '') {
                            // Strip CHAR(160) from the term
                            const strippedTerm = term.replace(String.fromCharCode(160), '').toLowerCase();

                            // Normalize cell content for comparison
                            const normalizedCellText = cell.innerHTML.replace(String.fromCharCode(160), '').toLowerCase();

                            // Debugging logs
                            console.log('Stripped Term:', strippedTerm);
                            console.log('Normalized Cell Content:', normalizedCellText);

                            // Create regex for the stripped term
                            const regex = new RegExp(`\\b(${strippedTerm})\\b`, 'gi');

                            // Apply highlighting directly on the progressively modified content
                            cell.innerHTML = cell.innerHTML.replace(regex, '<span style="color: green;">$1</span>');
                        }
                    });
                }
            }
        }

        if (visibleRowCount === 0) {
          showTemporaryAlert();
        }
        // Update the record count
        updateTotalRecordsCount();
    }

    function showTemporaryAlert() {
      const alertMessage = document.getElementById('alertMessage');
      alertMessage.style.display = 'block'; // Show the alert

      setTimeout(() => {
          alertMessage.style.display = 'none'; // Hide the alert after 3 seconds
          clearSearch(); // Clear the search box and reset results
      }, 3000);
    }

    function clearSearch() {
        google.script.run.logCall("HTML clearSearch",{});
        // Clear the search box and set focus
        document.getElementById('searchBox').value = '';
        document.getElementById('searchBox').focus();

        // Call getPublicData and update the table and count in the success handler
        google.script.run.withSuccessHandler(function(data) {
            if (data && data.length > 0) {
                populateTable(data); // Populate the table with new data
            } else {
                // Handle case where no data is returned
                document.getElementById('resultsTable').innerHTML = '<tr><td colspan="8">No records found.</td></tr>'; // Adjust colspan based on your table structure
            }
            updateTotalRecordsCount(); // Update the total records count after the table is populated
        }).getModalData();
    }

    // Dynamic search on typing
    document.getElementById('searchBox').addEventListener('input', filterResults);
  </script>
</body>
</html>
